name: E2E integration (real GitHub API)

on:
  workflow_dispatch: {}

# Runs only the integration-create test against the real content repo
# via GITHUB_E2E_KEY. This is the closest automated equivalent to a user
# actually clicking "Create" in the admin UI in production — it uses a
# real chromium with real network calls into a real content branch.
#
# Intentionally kept separate from the deploy gate so a hiccup in the
# real content repo doesn't block unrelated shipping work.

# Least-privilege GITHUB_TOKEN - deploys use dedicated secrets,
# nothing here needs repo write access via the ambient token.
permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    env:
      GITHUB_E2E_KEY: ${{ secrets.GH_E2E_PAT }}
      GITHUB_OWNER: communist-prometheus
      GITHUB_REPO: public-website-content
      GITHUB_BRANCH: master
      MOCK_OAUTH: 'false'
      VITE_MOCK_AUTH: 'false'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile

      - run: bunx playwright install --with-deps chromium

      - name: Build admin-website (non-mock)
        run: bun run build:client && bun run build:sw

      - name: Run integration-create spec
        run: |
          bunx playwright test \
            e2e/github-content/integration-create.spec.ts \
            --project=chromium \
            --reporter=list
