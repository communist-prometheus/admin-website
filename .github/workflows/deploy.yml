name: Deploy admin to Cloudflare Workers

on:
  push:
    branches: [master, develop]

# Serialise per branch — when a fresh master commit lands while an
# older deploy is still building, cancel the in-flight one. Same on
# develop. Master and develop never collide because the group key
# includes `github.ref`.
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Per-branch values come from repo Variables suffixed by branch:
    #   OAUTH_REDIRECT_URI_{MASTER,DEVELOP}
    #   VITE_GITHUB_CLIENT_ID_{MASTER,DEVELOP}
    # The "Resolve branch env" step picks the right pair and exports
    # it via $GITHUB_ENV so subsequent steps see plain env vars.
    # Keeps the workflow free of inline ternaries and centralises
    # secrets/hostnames in one place editable via the GitHub UI or
    # `gh variable`.
    env:
      VITE_MOCK_AUTH: 'false'
      OAUTH_REDIRECT_URI_MASTER: ${{ vars.OAUTH_REDIRECT_URI_MASTER }}
      OAUTH_REDIRECT_URI_DEVELOP: ${{ vars.OAUTH_REDIRECT_URI_DEVELOP }}
      VITE_GITHUB_CLIENT_ID_MASTER: ${{ vars.VITE_GITHUB_CLIENT_ID_MASTER }}
      VITE_GITHUB_CLIENT_ID_DEVELOP: ${{ vars.VITE_GITHUB_CLIENT_ID_DEVELOP }}
    steps:
      - name: Cloning git repository
        uses: actions/checkout@v6
        with:
          # e2e-toolkit lives in a separate repo and is wired in as a
          # submodule. Without this, e2e tsconfig path mapping points
          # at an empty directory and astro check fails with cannot
          # find module '@prometheus/e2e-toolkit'.
          submodules: true

      - name: Resolve branch env
        run: |
          if [ "$GITHUB_REF_NAME" = "develop" ]; then
            echo "VITE_GITHUB_BRANCH=develop" >> "$GITHUB_ENV"
            echo "VITE_OAUTH_REDIRECT_URI=$OAUTH_REDIRECT_URI_DEVELOP" >> "$GITHUB_ENV"
            echo "VITE_GITHUB_CLIENT_ID=$VITE_GITHUB_CLIENT_ID_DEVELOP" >> "$GITHUB_ENV"
            echo "GITHUB_BRANCH=develop" >> "$GITHUB_ENV"
            echo "WRANGLER_COMMAND=deploy --env develop" >> "$GITHUB_ENV"
          else
            echo "VITE_GITHUB_BRANCH=master" >> "$GITHUB_ENV"
            echo "VITE_OAUTH_REDIRECT_URI=$OAUTH_REDIRECT_URI_MASTER" >> "$GITHUB_ENV"
            echo "VITE_GITHUB_CLIENT_ID=$VITE_GITHUB_CLIENT_ID_MASTER" >> "$GITHUB_ENV"
            echo "GITHUB_BRANCH=master" >> "$GITHUB_ENV"
            echo "WRANGLER_COMMAND=deploy" >> "$GITHUB_ENV"
          fi

      # Wrangler 4 (used by `bunx wrangler dev` below) requires Node 22+.
      # setup-bun ships bundled Node, but `bunx wrangler` resolves against
      # whatever node is on $PATH. Pin Node 24 (current LTS, matches the
      # runner's action runtime) so the wrangler CLI doesn't refuse to
      # start with "requires at least Node.js v22".
      - name: Installing Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Installing tools and dependencies
        uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Running unit tests
        run: bun run test:unit --run

      - name: Building application (validate + type-check + lint + build)
        run: bun run build

      - name: Installing Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Running E2E tests
        run: bunx playwright test --project=chromium --reporter=line
        timeout-minutes: 20

      # Playwright's webServer runs `bun run build:e2e` which overwrites
      # dist/ with a VITE_MOCK_AUTH=true bundle AND leaves a
      # `vite preview` serving that mock bundle on port 5173. Kill that
      # preview before rebuilding — otherwise the smoke test below
      # connects to the stale mock-mode preview and fails with 503
      # (SW can't init because the mock bundle's clone path is gone).
      - name: Killing stale mock-mode preview
        run: bun scripts/kill-port.ts 5173 || true

      # Rebuild the production (non-mock) bundle in place. Without this,
      # wrangler ships a SW that stays in mock mode in the browser —
      # every commit becomes `sha: mock` and nothing reaches the
      # content repo.
      - name: Rebuilding production bundle after e2e
        run: bun run build:client && bun run build:sw

      # Deploy-gate smoke test: spin up the REAL CF worker locally via
      # wrangler dev so the /api/cors/github.com/* proxy is served by
      # the actual worker code (same as prod). `vite preview` only
      # serves static files — requests to /api/cors/* fall through to
      # the SPA HTML and isomorphic-git fails with SmartHttpError
      # ("Expected # service=git-upload-pack but received <!DOCTYPE html>").
      # With wrangler dev the smoke test hits the real proxy and pushes
      # to GitHub exactly like the production SW would.
      - name: Starting wrangler dev on the rebuilt bundle
        run: |
          bunx wrangler dev --port 5173 --ip 127.0.0.1 --local \
            > /tmp/wrangler.log 2>&1 &
          echo "wrangler pid=$!"
        shell: bash

      - name: Waiting for wrangler dev to listen
        run: |
          for i in $(seq 1 60); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:5173/ || echo 000)
            if [ "$code" = "200" ]; then
              echo "wrangler up"
              if curl -sS http://127.0.0.1:5173/sw.js | grep -q createHash; then
                echo "ERROR: wrangler is serving a browser-unsafe bundle"
                exit 1
              fi
              exit 0
            fi
            sleep 1
          done
          echo "wrangler failed to start"
          cat /tmp/wrangler.log || true
          exit 1

      - name: Deploy-gate smoke test (real commit via prod bundle)
        env:
          PROD_SMOKE: '1'
          PROBE_BASE_URL: 'http://127.0.0.1:5173'
          GITHUB_E2E_KEY: ${{ secrets.GH_E2E_PAT }}
          GITHUB_OWNER: communist-prometheus
          GITHUB_REPO: public-website-content
          # GITHUB_BRANCH was resolved by the "Resolve branch env" step
          # at the top of the job and is already in the environment.
        run: |
          bunx playwright test --config=playwright.config.prod.ts \
            e2e-prod/prod-bundle-smoke.pw.ts --reporter=line

      - name: Deploying to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          wranglerVersion: "4.80.0"
          # WRANGLER_COMMAND was resolved by the "Resolve branch env"
          # step (deploy --env develop on develop, deploy on master).
          command: ${{ env.WRANGLER_COMMAND }}
