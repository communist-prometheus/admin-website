name: Deploy admin to Cloudflare Workers

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # VITE_* env vars are injected into the client bundle at build time by
    # Vite. Without this, `import.meta.env.VITE_GITHUB_CLIENT_ID` resolves
    # to undefined and the admin sends an empty client_id to GitHub on
    # Login click — which renders as a 404 on github.com/login/oauth/authorize.
    env:
      VITE_GITHUB_CLIENT_ID: ${{ vars.VITE_GITHUB_CLIENT_ID }}
      VITE_MOCK_AUTH: 'false'
      VITE_GITHUB_BRANCH: master
    steps:
      - name: Cloning git repository
        uses: actions/checkout@v4

      - name: Installing tools and dependencies
        uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Running unit tests
        run: bun run test:unit --run

      - name: Building application (validate + type-check + lint + build)
        run: bun run build

      - name: Installing Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Running E2E tests
        run: bunx playwright test --project=chromium --reporter=line
        timeout-minutes: 20

      # Playwright's webServer runs `bun run build:e2e` which overwrites
      # dist/ with a VITE_MOCK_AUTH=true bundle AND leaves a
      # `vite preview` serving that mock bundle on port 5173. Kill that
      # preview before rebuilding — otherwise the smoke test below
      # connects to the stale mock-mode preview and fails with 503
      # (SW can't init because the mock bundle's clone path is gone).
      - name: Killing stale mock-mode preview
        run: bun scripts/kill-port.ts 5173 || true

      # Rebuild the production (non-mock) bundle in place. Without this,
      # wrangler ships a SW that stays in mock mode in the browser —
      # every commit becomes `sha: mock` and nothing reaches the
      # content repo.
      - name: Rebuilding production bundle after e2e
        run: bun run build:client && bun run build:sw

      # Deploy-gate smoke test: spin up the REAL CF worker locally via
      # wrangler dev so the /api/cors/github.com/* proxy is served by
      # the actual worker code (same as prod). `vite preview` only
      # serves static files — requests to /api/cors/* fall through to
      # the SPA HTML and isomorphic-git fails with SmartHttpError
      # ("Expected # service=git-upload-pack but received <!DOCTYPE html>").
      # With wrangler dev the smoke test hits the real proxy and pushes
      # to GitHub exactly like the production SW would.
      - name: Starting wrangler dev on the rebuilt bundle
        run: |
          bunx wrangler dev --port 5173 --ip 127.0.0.1 --local \
            > /tmp/wrangler.log 2>&1 &
          echo "wrangler pid=$!"
        shell: bash

      - name: Waiting for wrangler dev to listen
        run: |
          for i in $(seq 1 60); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:5173/ || echo 000)
            if [ "$code" = "200" ]; then
              echo "wrangler up"
              if curl -sS http://127.0.0.1:5173/sw.js | grep -q createHash; then
                echo "ERROR: wrangler is serving a browser-unsafe bundle"
                exit 1
              fi
              exit 0
            fi
            sleep 1
          done
          echo "wrangler failed to start"
          cat /tmp/wrangler.log || true
          exit 1

      - name: Deploy-gate smoke test (real commit via prod bundle)
        env:
          PROD_SMOKE: '1'
          PROBE_BASE_URL: 'http://127.0.0.1:5173'
          GITHUB_E2E_KEY: ${{ secrets.GH_E2E_PAT }}
          GITHUB_OWNER: communist-prometheus
          GITHUB_REPO: public-website-content
          GITHUB_BRANCH: master
        run: |
          bunx playwright test --config=playwright.config.prod.ts \
            e2e-prod/prod-bundle-smoke.pw.ts --reporter=line

      - name: Deploying to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          wranglerVersion: "4.80.0"
