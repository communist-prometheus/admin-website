name: Deploy admin to Cloudflare Workers

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # VITE_* env vars are injected into the client bundle at build time by
    # Vite. Without this, `import.meta.env.VITE_GITHUB_CLIENT_ID` resolves
    # to undefined and the admin sends an empty client_id to GitHub on
    # Login click — which renders as a 404 on github.com/login/oauth/authorize.
    env:
      VITE_GITHUB_CLIENT_ID: ${{ vars.VITE_GITHUB_CLIENT_ID }}
      VITE_MOCK_AUTH: 'false'
      VITE_GITHUB_BRANCH: master
    steps:
      - name: Cloning git repository
        uses: actions/checkout@v4

      - name: Installing tools and dependencies
        uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Running unit tests
        run: bun run test:unit --run

      - name: Building application (validate + type-check + lint + build)
        run: bun run build

      - name: Installing Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Running E2E tests
        run: bunx playwright test --project=chromium --reporter=line

      # Playwright's webServer runs `bun run build:e2e` which overwrites
      # dist/ with a VITE_MOCK_AUTH=true bundle. Rebuild the production
      # (non-mock) bundle before deploy, otherwise wrangler ships a SW
      # that stays in mock mode in the browser — every commit becomes
      # `sha: mock` and nothing reaches the content repo.
      - name: Rebuilding production bundle after e2e
        run: bun run build:client && bun run build:sw

      # Deploy-gate smoke test: start a preview of the rebuilt prod
      # bundle, drive a real chromium against it with the e2e PAT,
      # assert `commit.sha` is a real 40-char hash and not `"mock"`.
      # Catches the mock-mode-regression even if the rebuild step above
      # silently produces the wrong bundle.
      - name: Starting preview of rebuilt bundle
        run: bunx vite preview --port 5173 --outDir dist/client &
        shell: bash

      - name: Waiting for preview to listen
        run: |
          for i in $(seq 1 30); do
            if curl -sS -o /dev/null -w '%{http_code}' http://localhost:5173/ | grep -q 200; then
              echo "preview up"
              exit 0
            fi
            sleep 1
          done
          echo "preview failed to start"
          exit 1

      - name: Deploy-gate smoke test (real commit via prod bundle)
        env:
          PROD_SMOKE: '1'
          GITHUB_E2E_KEY: ${{ secrets.GH_E2E_PAT }}
          GITHUB_OWNER: communist-prometheus
          GITHUB_REPO: public-website-content
          GITHUB_BRANCH: master
        run: |
          bunx playwright test e2e/content/prod-bundle-smoke.spec.ts \
            --project=chromium --reporter=line

      - name: Deploying to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          wranglerVersion: "4.80.0"
