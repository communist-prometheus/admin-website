name: Real-mode E2E (real GitHub sandbox)

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master, develop]

# Real-mode pushes to a single sandbox branch. Two runs racing for it
# corrupt the working tree mid-clone — serialize at the workflow level
# rather than relying on test-level retries.
concurrency:
  group: realmode-e2e
  cancel-in-progress: false

# Least-privilege GITHUB_TOKEN - deploys use dedicated secrets,
# nothing here needs repo write access via the ambient token.
permissions:
  contents: read

jobs:
  realmode:
    runs-on: ubuntu-latest
    # Deny the sandbox PAT to fork PRs: GitHub already withholds
    # secrets from fork-PR runs, but this guard keeps the job from
    # running attacker-edited test code next to the secret even if
    # repo settings ever loosen.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      SANDBOX_OWNER: communist-prometheus
      SANDBOX_REPO: admin-e2e-sandbox
      SANDBOX_BRANCH: main
      SANDBOX_BASELINE_TAG: baseline
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium

      # `sandbox:reset` only rewinds the sandbox branch to the baseline TAG —
      # it does not rebuild that tag from the fixtures. So a fixture change
      # (renaming e2e-realmode/fixtures/baseline/newspaper/ → magazine/) was a
      # silent no-op: the suite kept running against the OLD baseline and every
      # spec died on "File not found: magazine/issue-1/index.en.md". Re-seed the
      # baseline from the fixtures on every run so what the tests assert and
      # what the sandbox holds can never drift apart again.
      - name: Re-seed sandbox baseline from fixtures
        env:
          GITHUB_E2E_KEY: ${{ secrets.GH_E2E_PAT }}
        run: bun run sandbox:setup -- --force

      - name: Reset sandbox to baseline
        env:
          GITHUB_E2E_KEY: ${{ secrets.GH_E2E_PAT }}
        run: bun run sandbox:reset

      - name: Run real-mode suite
        env:
          GITHUB_E2E_KEY: ${{ secrets.GH_E2E_PAT }}
        run: bun run test:e2e:realmode

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-realmode-report
          path: |
            playwright-report
            test-results
          retention-days: 7
