name: Push worker secrets

on:
  workflow_dispatch: {}

# One-shot: push GH_APP_PRIVATE_KEY, GH_APP_ID, GH_INSTALLATION_ID, and
# ADMIN_PASSWORD to the admin-website Cloudflare Worker as secret bindings
# via the CF API. Run this whenever any of the upstream values change.
#
# The worker side then uses these to mint GitHub App installation tokens
# via JWT without going through OAuth — which sidesteps the whole
# redirect_uri registration problem entirely.

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: PUT GH_APP_PRIVATE_KEY on admin-website worker
        env:
          VAL: ${{ secrets.GH_APP_PRIVATE_KEY }}
        run: |
          node -e '
            const https = require("node:https");
            const body = JSON.stringify({
              name: "GH_APP_PRIVATE_KEY",
              text: process.env.VAL,
              type: "secret_text",
            });
            const req = https.request({
              method: "PUT",
              host: "api.cloudflare.com",
              path: "/client/v4/accounts/" + process.env.CF_ACCOUNT_ID + "/workers/scripts/admin-website/secrets",
              headers: {
                "Authorization": "Bearer " + process.env.CF_API_TOKEN,
                "Content-Type": "application/json",
                "Content-Length": Buffer.byteLength(body),
              },
            }, res => {
              let data = "";
              res.on("data", c => data += c);
              res.on("end", () => {
                const j = JSON.parse(data);
                console.log("status", res.statusCode, "success", j.success, "errors", JSON.stringify(j.errors));
                process.exit(j.success ? 0 : 1);
              });
            });
            req.on("error", e => { console.error(e); process.exit(1); });
            req.write(body);
            req.end();
          '
      - name: PUT ADMIN_PASSWORD on admin-website worker
        env:
          VAL: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          node -e '
            const https = require("node:https");
            const body = JSON.stringify({
              name: "ADMIN_PASSWORD",
              text: process.env.VAL,
              type: "secret_text",
            });
            const req = https.request({
              method: "PUT",
              host: "api.cloudflare.com",
              path: "/client/v4/accounts/" + process.env.CF_ACCOUNT_ID + "/workers/scripts/admin-website/secrets",
              headers: {
                "Authorization": "Bearer " + process.env.CF_API_TOKEN,
                "Content-Type": "application/json",
                "Content-Length": Buffer.byteLength(body),
              },
            }, res => {
              let data = "";
              res.on("data", c => data += c);
              res.on("end", () => {
                const j = JSON.parse(data);
                console.log("status", res.statusCode, "success", j.success, "errors", JSON.stringify(j.errors));
                process.exit(j.success ? 0 : 1);
              });
            });
            req.on("error", e => { console.error(e); process.exit(1); });
            req.write(body);
            req.end();
          '
      - name: Verify secrets list
        run: |
          curl -sS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/admin-website/secrets" \
            | jq '.result'
