<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin panel for managing GitHub repositories with OAuth authentication">
    <meta name="theme-color" content="hsl(12, 80%, 45%)">
    <meta name="author" content="Admin Panel">
    <meta property="og:title" content="Admin Panel - GitHub Repository Manager">
    <meta property="og:description" content="Admin panel for managing GitHub repositories with OAuth authentication">
    <meta property="og:type" content="website">
    <meta property="og:url" content="http://localhost:3000/">
    <link rel="canonical" href="http://localhost:3000/">
    <link rel="preload" href="/assets/style.css" as="style">
    <link rel="stylesheet" href="/assets/style.css">
    <title>Admin Panel - GitHub Repository Manager</title>
  </head>
  <body>
    <app-layout>
      <template shadowrootmode="open">
        <style>
          .app-layout {
            display: grid;
            grid-template-rows: auto 1fr auto;
            min-height: 100vh;
            color: var(--color-text);
          }

          header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: clamp(0.75rem, 2vw, 1rem) clamp(1rem, 4vw, 2rem);
            border-bottom: 1px solid var(--color-border);
            background: var(--color-background);
            color: var(--color-heading);
          }

          h1 {
            font-size: clamp(1.25rem, 3vw, 1.5rem);
            font-weight: 600;
            margin: 0;
          }

          main {
            padding: clamp(1rem, 4vw, 2rem);
            color: var(--color-text);
          }

          footer {
            padding: clamp(1rem, 3vw, 1.5rem) clamp(1rem, 4vw, 2rem);
            border-top: 1px solid var(--color-border);
            background: var(--color-background-mute);
            text-align: center;
            color: var(--color-text-muted);
            font-size: clamp(0.75rem, 2vw, 0.875rem);
          }
        </style>
        <slot></slot>
      </template>
      <div id="app"><!--ssr-outlet--></div>
    </app-layout>
    <script type="module" src="/src/entry-client.ts"></script>
  </body>
</html>
